<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Priming Solutions_Fixed</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg-color: #f4f4f7;
            --card-white: #ffffff;
            --priming-blue: #3498db;
            --priming-navy: #1a2a40;
            --text-gray: #333333;
            --list-gray: #666666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            -webkit-user-select: none;
        }

        .card-container {
            perspective: 1000px;
        }

        .business-card {
            width: 350px;
            height: 220px; /* 내용을 다 담기 위해 높이를 살짝 키웠습니다 */
            background: var(--card-white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column; /* 상하 구조로 변경하여 깨짐 방지 */
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.1s ease-out;
            position: relative;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .business-card:active {
            transform: translateY(-5px) rotateX(4deg) scale(1.02);
        }

        /* 로고 영역 최적화 */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            flex-shrink: 0; /* 로고 영역이 줄어들지 않게 고정 */
        }

        .logo-img {
            max-height: 50px; /* 로고 높이를 엄격하게 제한 */
            width: auto;
            object-fit: contain;
            margin-bottom: 5px;
        }

        .company-info {
            text-align: center;
        }

        .company-name {
            font-size: 16px;
            font-weight: 800;
            color: var(--priming-navy);
            letter-spacing: -0.5px;
            margin: 0;
        }

        .company-slogan {
            font-size: 9px;
            color: var(--priming-blue);
            font-weight: 700;
            text-transform: uppercase;
        }

        /* 정보 영역 레이아웃 */
        .content-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid #f0f0f0;
            padding-top: 12px;
            flex-grow: 1;
        }

        .solutions-list {
            font-size: 9px;
            color: var(--list-gray);
            margin: 0;
            padding: 0;
            list-style: none;
            line-height: 1.4;
        }

        .solutions-list li {
            position: relative;
            padding-left: 10px;
        }

        .solutions-list li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--priming-blue);
        }

        .personal-info {
            text-align: right;
        }

        .personal-info h1 {
            margin: 0;
            font-size: 18px;
            color: #000;
        }

        .personal-info p {
            margin: 2px 0 8px 0;
            font-size: 10px;
            color: var(--priming-blue);
            font-weight: 600;
        }

        .contact-details {
            font-size: 10px;
            color: var(--text-gray);
            line-height: 1.5;
        }

        .contact-details a {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="business-card">
            
            <div class="logo-section">
                <img src="프라이밍 로고 2.jpg" alt="Logo" class="logo-img">
                <div class="company-info">
                    <div class="company-name">PRIMING SOLUTIONS</div>
                    <div class="company-slogan">Advanced Water Preparation</div>
                </div>
            </div>

            <div class="content-section">
                <ul class="solutions-list">
                    <li>Advanced Water Purification</li>
                    <li>Industrial Water Treatment</li>
                    <li>Strategic Project Management</li>
                    <li>Technical Consulting</li>
                </ul>

                <div class="personal-info">
                    <h1>남 봉 우</h1>
                    <p>Managing Director / Founder</p>
                    
                    <div class="contact-details">
                        <a href="tel:010-5448-3246">010.5448.3246</a><br>
                        <a href="mailto:sixvalue@gmail.com">sixvalue@gmail.com</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
