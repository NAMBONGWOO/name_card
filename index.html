<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>비즈니스 카드_남봉우</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon_priming.png"> <style>
        :root {
            --bg-color: #f4f4f7;
            --card-white: #ffffff;
            --priming-navy: #1a2a40; /* 프라이밍 솔루션 메인 컬러 (짙은 네이비) */
            --point-gold: #c6a77d; /* 서브 컬러 (골드 포인트) */
            --text-gray: #555555;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            -webkit-user-select: none; /* 텍스트 드래그 방지 (앱처럼 보이기 위해) */
        }

        /* 명함 케이스(컨테이너) */
        .card-container {
            perspective: 1000px; /* 3D 효과를 위한 원근감 */
        }

        /* 실제 명함 디자인 */
        .business-card {
            width: 330px; /* 아이폰 화면 폭에 맞춘 표준 명함 비율 */
            height: 190px;
            background: var(--card-white);
            border-radius: 8px; /* 실제 명함의 미세한 곡률 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            padding: 25px;
            box-sizing: border-box;
            transition: transform 0.1s ease-out, box-shadow 0.1s ease-out; /* 터치 피드백 애니메이션 */
            position: relative;
            overflow: hidden;
        }

        /* 눌렀을 때 살짝 튀어 오르는 효과 (햅틱 반응 느낌) */
        .business-card:active {
            transform: translateY(-5px) rotateX(2deg) scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        /* 명함 우측 하단 골드 라인 포인트 */
        .business-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100px;
            height: 4px;
            background-color: var(--point-gold);
        }

        /* --- 레이아웃 설정 --- */

        /* 좌측: 로고 */
        .card-left {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid #eee; /* 세로 구분선 */
            margin-right: 20px;
        }

        .logo-area {
            font-size: 20px;
            font-weight: 800;
            color: var(--priming-navy);
            letter-spacing: -1px;
        }

        /* 우측: 정보 */
        .card-right {
            flex: 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-left: 5px;
        }

        /* 이름/직함 */
        .name-area h1 {
            margin: 0;
            font-size: 22px;
            color: #000;
        }
        
        .name-area p {
            margin: 3px 0 0 0;
            font-size: 13px;
            color: var(--text-gray);
            letter-spacing: 1px;
        }

        /* 연락처 정보 */
        .contact-area {
            font-size: 12px;
            color: var(--text-gray);
            line-height: 1.6;
        }
        
        /* 연락처 링크 스타일 제거 */
        .contact-area a {
            text-decoration: none;
            color: inherit;
        }

        /* 자문 파트너 정보 */
        .partner-area {
            font-size: 11px;
            color: #aaa;
            margin-top: 10px;
            border-top: 1px solid #f0f0f0;
            padding-top: 5px;
        }

    </style>
</head>
<body>

    <div class="card-container">
        <div class="business-card">
            
            <div class="card-left">
                <div class="logo-area">
                    Priming<br>Solutions
                </div>
            </div>

            <div class="card-right">
                <div class="name-area">
                    <h1>남 봉 우</h1>
                    <p>팀장</p>
                </div>

                <div class="contact-area">
                    T. <a href="tel:010-5448-3246">010.5448.3246</a><br>
                    E. <a href="sixvalue@gmail.com">sixvalue@gmail.com</a><br>
                    Web. <a href="priming-sol.vercel.app">priming-sol.vercel.app</a>
                </div>

                <div class="partner-area">
                    ADVANCED WATER PREPARATION
                </div>
            </div>

        </div>
    </div>

</body>
</html>
