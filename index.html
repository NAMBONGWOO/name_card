<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>남봉우 대표 명함</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png"> 
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .card {
            background: white;
            width: 320px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .logo {
            font-weight: 800;
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 20px;
            letter-spacing: -1px;
        }
        .info h1 {
            margin: 10px 0 5px;
            font-size: 22px;
        }
        .info p {
            color: #666;
            margin-bottom: 25px;
        }
        .contact-btn {
            display: block;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .contact-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Priming Solutions</div>
        <div class="info">
            <h1>남봉우</h1>
            <p>CEO / 대표이사</p>
        </div>
        <a href="tel:010-0000-0000" class="contact-btn">전화하기</a>
        <a href="mailto:email@address.com" class="contact-btn" style="background: var(--primary-color);">이메일 보내기</a>
        <div style="margin-top: 20px; font-size: 12px; color: #aaa;">
            마중물 장학재단 자문 파트너
        </div>
    </div>
</body>
</html>
