<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Priming Solutions_Daniel Nam</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg-color: #f4f4f7;
            --card-white: #ffffff;
            --priming-blue: #3498db;
            --priming-navy: #1a2a40;
            --text-gray: #555555;
            --list-gray: #777777;
            --touch-highlight: #ebf5fb;
            /* 은은한 버튼을 위한 반투명 컬러 */
            --btn-glass-bg: rgba(255, 255, 255, 0.4); 
            --btn-glass-border: rgba(255, 255, 255, 0.2);
            --btn-glass-shadow: rgba(0, 0, 0, 0.05);
            --btn-glass-active: rgba(52, 152, 219, 0.5); /* 터치 시 푸른 반투명 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            -webkit-user-select: none;
            overflow: hidden; /* 회전 시 스크롤 방지 */
        }

        .card-container {
            perspective: 1000px;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); /* 더 부드럽고 자연스러운 회전 */
        }

        /* [핵심] 가로 회전 상태 클래스 */
        .rotated {
            transform: rotate(90deg) scale(1.6); /* 90도 회전 및 1.6배 확대 (시원하게) */
        }

        .business-card {
            width: 340px;
            height: 200px;
            background: var(--card-white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            padding: 15px 20px;
            box-sizing: border-box;
            transition: transform 0.1s ease-out;
            position: relative;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* [해결] 은은한 유리 지갑 스타일 회전 버튼 (FAB) */
        .rotate-button {
            position: fixed;
            bottom: 30px; /* 기본 위치 (세로 모드) */
            right: 30px;
            width: 48px;
            height: 48px;
            background-color: var(--btn-glass-bg);
            color: var(--priming-navy);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px var(--btn-glass-shadow);
            z-index: 1000;
            cursor: pointer;
            font-size: 20px;
            /* 테두리와 배경 blur 효과로 '은은함' 구현 */
            border: 1px solid var(--btn-glass-border);
            -webkit-backdrop-filter: blur(8px); /* 사파리 지원 필수 */
            backdrop-filter: blur(8px);
            transition: all 0.4s ease-out; /* 부드러운 위치/색상 변화 */
        }

        /* 터치 시 피드백 */
        .rotate-button:active {
            transform: scale(0.9) translateY(2px);
            background-color: var(--btn-glass-active);
            color: white;
        }

        /* [해결] 회전 시 버튼 위치 변경 클래스 (내용을 가리지 않게) */
        .button-rotated-pos {
            bottom: 10px; /* 가로 모드 시 명함 아래쪽으로 이동 */
            right: 15px;
            transform: scale(0.85); /* 약간 작게 */
            opacity: 0.8; /* 더 은은하게 */
        }

        /* 나머지 기존 스타일 유지 */
        .card-left { flex: 1.1; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid #f0f0f0; margin-right: 15px; text-align: center; }
        .qr-code { width: 45px; height: 45px; margin-bottom: 10px; padding: 2px; border: 1px solid #eee; border-radius: 4px; }
        .logo-v2 { width: 50px; height: auto; margin-bottom: 6px; object-fit: contain; }
        .logo-text { font-size: 12px; font-weight: 800; color: var(--priming-navy); line-height: 1.1; }
        .logo-sub { font-size: 6.5px; color: var(--priming-blue); margin-top: 3px; letter-spacing: 0.1px; }
        .card-right { flex: 2; display: flex; flex-direction: column; justify-content: space-between; }
        .name-area h1 { margin: 0; font-size: 20px; color: #000; letter-spacing: -0.5px; }
        .name-area p { margin: 2px 0 0 0; font-size: 10px; color: var(--priming-blue); font-weight: 700; letter-spacing: 0.5px; }
        .solution-list { font-size: 9px; color: var(--list-gray); margin: 8px 0; padding: 0; list-style: none; line-height: 1.4; }
        .solution-list li::before { content: "•"; color: var(--priming-blue); margin-right: 4px; }
        .contact-area { font-size: 10px; color: var(--text-gray); text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .contact-area a { text-decoration: none; color: inherit; padding: 2px 6px; border-radius: 4px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        .contact-area a:active { background-color: var(--touch-highlight); color: var(--priming-blue); }
        .contact-area a::before { font-size: 9px; opacity: 0.7; }
        .link-tel::before { content: "📞"; }
        .link-mail::before { content: "✉️"; }
        .link-web::before { content: "🌐"; }
    </style>
</head>
<body>

    <button id="rotateBtn" class="rotate-button" onclick="toggleRotate()">🔄</button>

    <div id="cardContainer" class="card-container">
        <div class="business-card">
            <div class="card-left">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://nambongwoo.github.io/name_card/" alt="QR Code" class="qr-code">
                <img src="logo_v2.png" alt="Logo" class="logo-v2">
                <div class="logo-text">PRIMING<br>SOLUTIONS</div>
                <div class="logo-sub">ADVANCED WATER PREPARATION</div>
            </div>

            <div class="card-right">
                <div class="name-area">
                    <h1>DANIEL NAM</h1>
                    <p>Managing Director</p>
                </div>
                <ul class="solution-list">
                    
                    <li>Fintech Software Consulting</li>
                    <li>Strategic Project Management</li>
                </ul>
                <div class="contact-area">
                    <a href="tel:010-5448-3246" class="link-tel">010.5448.3246</a>
                    <a href="mailto:sixvalue@gmail.com" class="link-mail">sixvalue@gmail.com</a>
                    <a href="https://priming-sol.vercel.app" target="_blank" class="link-web">priming-sol.vercel.app</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleRotate() {
            const container = document.getElementById('cardContainer');
            const btn = document.getElementById('rotateBtn');
            
            // 명함 회전 토글
            container.classList.toggle('rotated');
            // [해결] 버튼 위치 변경 클래스 토글 (가로 모드 시 내용을 안 가리게)
            btn.classList.toggle('button-rotated-pos');
        }
    </script>

</body>
</html>
