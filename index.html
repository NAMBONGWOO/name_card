<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Priming Solutions_남봉우</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg-color: #f4f4f7;
            --card-white: #ffffff;
            --priming-blue: #3498db; /* 워터 드롭 포인트 블루 */
            --priming-navy: #1a2a40; /* 텍스트 메인 네이비 */
            --text-gray: #555555;
            --list-gray: #777777;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            -webkit-user-select: none;
        }

        .card-container {
            perspective: 1000px;
        }

        .business-card {
            width: 340px;
            height: 200px;
            background: var(--card-white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* 3D 터치 피드백 */
        .business-card:active {
            transform: translateY(-5px) rotateX(4deg) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        /* 왼쪽: 로고 및 슬로건 영역 */
        .card-left {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px solid #f0f0f0;
            margin-right: 15px;
            text-align: center;
        }

        .logo-img {
            width: 50px;
            margin-bottom: 10px;
        }

        .logo-text {
            font-size: 14px;
            font-weight: 800;
            color: var(--priming-navy);
            line-height: 1.1;
        }

        .logo-sub {
            font-size: 7px;
            color: var(--priming-blue);
            margin-top: 4px;
            letter-spacing: 0.2px;
        }

        /* 오른쪽: 상세 정보 영역 */
        .card-right {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .name-area h1 {
            margin: 0;
            font-size: 20px;
            color: #000;
        }
        
        .name-area p {
            margin: 2px 0 0 0;
            font-size: 11px;
            color: var(--priming-blue);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* 솔루션 리스트 (이미지 기반 내용 추가) */
        .solution-list {
            font-size: 9px;
            color: var(--list-gray);
            margin: 10px 0;
            padding: 0;
            list-style: none;
            line-height: 1.3;
        }

        .solution-list li::before {
            content: "•";
            color: var(--priming-blue);
            margin-right: 4px;
        }

        .contact-area {
            font-size: 10.5px;
            color: var(--text-gray);
            line-height: 1.5;
            text-align: right;
        }
        
        .contact-area a {
            text-decoration: none;
            color: inherit;
        }

    </style>
</head>
<body>

    <div class="card-container">
        <div class="business-card">
            
            <div class="card-left">
                <div style="font-size: 40px; margin-bottom: 5px;">💧</div> 
                <div class="logo-text">PRIMING<br>SOLUTIONS</div>
                <div class="logo-sub">ADVANCED WATER PREPARATION</div>
            </div>

            <div class="card-right">
                <div class="name-area">
                    <h1>남 봉 우</h1>
                    <p>Managing Director / Founder</p>
                </div>

                <ul class="solution-list">
                    <li>Advanced Water Purification</li>
                    <li>Industrial Water Treatment</li>
                    <li>Strategic Project Management</li>
                </ul>

                <div class="contact-area">
                    <a href="tel:010-5448-3246">010.5448.3246</a><br>
                    <a href="mailto:sixvalue@gmail.com">sixvalue@gmail.com</a><br>
                    <a href="https://priming-sol.vercel.app" target="_blank">priming-sol.vercel.app</a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
