<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Priming Solutions_Daniel Nam</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg-color: #f4f4f7;
            --card-white: #ffffff;
            --priming-blue: #3498db;
            --priming-navy: #1a2a40;
            --text-gray: #555555;
            --list-gray: #777777;
            --touch-highlight: #ebf5fb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            -webkit-user-select: none;
        }

        .card-container {
            perspective: 1000px;
        }

        .business-card {
            width: 340px;
            height: 200px;
            background: var(--card-white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            padding: 15px 20px; /* QR 공간 확보를 위해 패딩 소폭 조정 */
            box-sizing: border-box;
            transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .business-card:active {
            transform: translateY(-3px) rotateX(2deg) scale(1.01);
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }

        .card-left {
            flex: 1.1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* QR-로고가 중앙에 오도록 */
            align-items: center;
            border-right: 1px solid #f0f0f0;
            margin-right: 15px;
            text-align: center;
        }

        /* QR 코드 스타일 */
        .qr-code {
            width: 45px;
            height: 45px;
            margin-bottom: 10px; /* 로고와의 간격 */
            padding: 2px;
            border: 1px solid #eee;
            border-radius: 4px;
        }

        .logo-v2 {
            width: 50px; /* QR 추가로 크기 소폭 최적화 */
            height: auto;
            margin-bottom: 6px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 12px;
            font-weight: 800;
            color: var(--priming-navy);
            line-height: 1.1;
        }

        .logo-sub {
            font-size: 6.5px;
            color: var(--priming-blue);
            margin-top: 3px;
            letter-spacing: 0.1px;
        }

        .card-right {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .name-area h1 {
            margin: 0;
            font-size: 20px;
            color: #000;
            letter-spacing: -0.5px;
        }
        
        .name-area p {
            margin: 2px 0 0 0;
            font-size: 10px;
            color: var(--priming-blue);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .solution-list {
            font-size: 9px;
            color: var(--list-gray);
            margin: 8px 0;
            padding: 0;
            list-style: none;
            line-height: 1.4;
        }

        .solution-list li::before {
            content: "•";
            color: var(--priming-blue);
            margin-right: 4px;
        }

        .contact-area {
            font-size: 10px;
            color: var(--text-gray);
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }
        
        .contact-area a {
            text-decoration: none;
            color: inherit;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .contact-area a:active {
            background-color: var(--touch-highlight);
            color: var(--priming-blue);
            transform: scale(0.97);
        }

        .contact-area a::before {
            font-size: 9px;
            opacity: 0.7;
        }
        .link-tel::before { content: "📞"; }
        .link-mail::before { content: "✉️"; }
        .link-web::before { content: "🌐"; }

    </style>
</head>
<body>

    <div class="card-container">
        <div class="business-card">
            
            <div class="card-left">
                <img src="https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=https://nambongwoo.github.io/name_card/&choe=UTF-8" 
                     alt="QR Code" class="qr-code">
                
                <img src="logo_v2.png" alt="Logo" class="logo-v2">
                <div class="logo-text">PRIMING<br>SOLUTIONS</div>
                <div class="logo-sub">ADVANCED WATER PREPARATION</div>
            </div>

            <div class="card-right">
                <div class="name-area">
                    <h1>DANIEL NAM</h1>
                    <p>Managing Director / Founder</p>
                </div>

                <ul class="solution-list">
                    <li>Global Foundation Expansion Strategy</li>
                    <li>Fintech Software Consulting</li>
                    <li>Strategic Project Management</li>
                </ul>

                <div class="contact-area">
                    <a href="tel:010-5448-3246" class="link-tel">010.5448.3246</a>
                    <a href="mailto:sixvalue@gmail.com" class="link-mail">sixvalue@gmail.com</a>
                    <a href="https://priming-sol.vercel.app" target="_blank" class="link-web">priming-sol.vercel.app</a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
